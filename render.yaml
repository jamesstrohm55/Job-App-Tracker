services:
  - type: web
    name: hiretrackr-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hiretrackr-db
          property: connectionURI
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GMAIL_REDIRECT_URI
        sync: false
      - key: GMAIL_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: hiretrackr-db
    plan: free
    databaseName: hiretrackr
    user: hiretrackr
